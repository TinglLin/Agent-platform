# 知汇平台 Demo — Docker Compose 单机部署

services:
  backend:
    build:
      context: ./backend
    container_name: zhihui-backend
    environment:
      APP_ENV: production
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: "5000"
      DATABASE_URL: sqlite:///data/zhihui.db
      CHECKPOINT_DB_PATH: data/checkpoints.db
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_MODEL: deepseek-chat
    volumes:
      - zhihui-data:/app/data
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_USE_MOCK: "false"
        VITE_API_BASE_URL: ""
        VITE_APP_ENV: production
    container_name: zhihui-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  zhihui-data:
